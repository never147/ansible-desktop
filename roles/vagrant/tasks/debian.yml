---
- name: Remove old hashicorp.list file
  apt_repository:
    repo: "deb [arch=amd64] https://apt.releases.hashicorp.com {{ os_codename }} main"
    filename: hashicorp
    state: absent

- name: Remove HashiCorp key from legacy keyring
  apt_key:
    id: "AA16FCBCA621E701"
    keyring: /etc/apt/trusted.gpg
    state: absent
  failed_when: false

- name: Add HashiCorp repository
  deb822_repository:
    name: hashicorp
    types: deb
    uris: https://apt.releases.hashicorp.com
    suites: "{{ os_codename }}"
    components: main
    architectures: amd64
    signed_by: https://apt.releases.hashicorp.com/gpg
  register: hashicorp_repo

- name: Update apt cache when the HashiCorp repository changed
  apt:
    update_cache: yes
  when: hashicorp_repo is changed

# sudo apt-get update && sudo apt-get install vagrant
- name: Install vagrant
  apt:
    name: vagrant
    state: latest
