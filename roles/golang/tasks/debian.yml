---
- name: Try prerequisite repo config
  block:
    - name: Enable upstream repo
      apt_repository:
        repo: ppa:gophers/archive
        codename: "{{ os_codename }}"
        state: "{{
            (ansible_distribution_major_version|int < 24)
            |ternary('present', 'absent')
          }}"
  rescue:
    - debug:
        msg: "Gophers ppa not supported"

- name: "Install latest Go packages"
  apt:
    name:
      - "golang-go"
      - "golang-doc"
    state: latest

# golang-go is a metapackage that pulls in a versioned toolchain installed at
# /usr/lib/go-<version> (there is no unversioned /usr/lib/go), so discover the
# directory rather than hardcoding a path that does not exist.
- name: Locate installed Go toolchain directory
  find:
    paths: /usr/lib
    patterns: 'go-*'
    file_type: directory
  register: golang_install_dirs

- name: Update alternatives for go
  alternatives:
    name: "{{ item }}"
    link: "/usr/bin/{{ item }}"
    path: "{{ (golang_install_dirs.files | map(attribute='path') | sort | last) }}/bin/{{ item }}"
  with_items:
    - go
    - gofmt
  when: golang_install_dirs.files | length > 0

