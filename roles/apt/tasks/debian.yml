---
- name: Run the equivalent of "apt-get update" as a separate step
  apt:
    update_cache: yes
  tags:
    - apt_update

- name: Install required packages for deb822_repository
  apt:
    name: python3-debian
    state: present

- name: Update all packages to the latest version
  apt:
    upgrade: dist
  when: os_update == true
