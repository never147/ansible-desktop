---
- name: Remove old mozillateam.list file
  file:
    path: /etc/apt/sources.list.d/mozillateam.list
    state: absent

- name: Remove Mozilla PPA keys from legacy keyring
  apt_key:
    id: "{{ item }}"
    keyring: /etc/apt/trusted.gpg
    state: absent
  loop:
    - 0AB215679C571D1C8325275B9BDB3D89CE49EC21  # Old rsa1024 key
    - 738BEB9321D1AAEC13EA9391AEBDF4819BE21867  # New rsa4096 key
  failed_when: false

- name: Add Mozilla PPA repository
  deb822_repository:
    name: mozillateam-ppa
    types: deb
    uris: http://ppa.launchpad.net/mozillateam/ppa/ubuntu
    suites: "{{ os_codename }}"
    components: main
    architectures: amd64
    signed_by: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xAEBDF4819BE21867
  register: mozillateam_repo

- name: Create a fact with a list of packages to install
  set_fact:
    all_desktop_packages: "{{
        desktop_packages[os_distro|lower]
        |union(desktop_extra_packages[os_distro|lower])
      }}"

- name: Add spotify repository
  include_tasks:
    file: spotify-repo.yml
  when: >
    'spotify-client' in all_desktop_packages

- name: Add sublimetext repository
  include_tasks:
    file: sublimetext-repo.yml
  when: >
    'sublime-text' in all_desktop_packages

- name: Add dropbox repository
  include_tasks:
    file: dropbox-repo.yml
  when: >
    'dropbox' in all_desktop_packages

- name: Add Claude Desktop repository
  include_tasks:
    file: claude-desktop-repo.yml
  when: >
    'claude-desktop' in all_desktop_packages

- name: Update apt cache when a desktop repository changed
  apt:
    update_cache: yes
  when: >
    mozillateam_repo is changed
    or (spotify_repo is defined and spotify_repo is changed)
    or (sublime_repo is defined and sublime_repo is changed)
    or (dropbox_repo is defined and dropbox_repo is changed)
    or (claude_desktop_repo is defined and claude_desktop_repo is changed)

- name: Install desktop packages
  apt:
    state: latest
    name: "{{ all_desktop_packages }}"

- name: Remove unwanted desktop packages
  apt:
    state: absent
    name: "{{ desktop_packages_unwanted[os_distro|lower] }}"

- name: Create a fact with a list of snaps to install
  set_fact:
    all_desktop_snaps: "{{
        desktop_snaps[os_distro|lower]
        |union(desktop_extra_snaps[os_distro|lower])
      }}"

- name: Install desktop Snaps
  snap:
    name: "{{ all_desktop_snaps }}"
  tags: [snaps]

- name: Set Snap options
  command: snap set core experimental.refresh-app-awareness=true
  tags: [snaps]

