---
- name: Remove old sublimetext.list file
  apt_repository:
    repo: deb https://download.sublimetext.com/ apt/stable/
    filename: sublimetext
    state: absent

- name: Remove Sublime Text key from legacy keyring
  apt_key:
    id: "8A8F901A"
    keyring: /etc/apt/trusted.gpg
    state: absent
  failed_when: false

- name: Add Sublime Text repository
  deb822_repository:
    name: sublimetext
    types: deb
    uris: https://download.sublimetext.com/
    suites: apt/stable/
    components: ""
    architectures: amd64
    signed_by: https://download.sublimetext.com/sublimehq-pub.gpg
  register: sublime_repo
