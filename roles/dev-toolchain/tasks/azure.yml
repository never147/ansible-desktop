- name: Remove old azure-cli.list file
  apt_repository:
    repo: "deb [arch=amd64] https://packages.microsoft.com/repos/azure-cli/ {{ os_codename }} main"
    filename: azure-cli
    state: absent

- name: Remove Microsoft key from legacy keyring
  apt_key:
    id: "EB3E94ADBE1229CF"
    keyring: /etc/apt/trusted.gpg
    state: absent
  failed_when: false

- name: Add Azure CLI repository
  deb822_repository:
    name: azure-cli
    types: deb
    uris: https://packages.microsoft.com/repos/azure-cli/
    suites: "{{ os_codename }}"
    components: main
    architectures: amd64
    signed_by: https://packages.microsoft.com/keys/microsoft.asc
  register: azure_cli_repo

- name: Update apt cache when the Azure CLI repository changed
  apt:
    update_cache: yes
  when: azure_cli_repo is changed

- name: Install
  apt:
    name: azure-cli

